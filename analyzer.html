<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Tuner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    h1 {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: #444;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Note display ── */
    .note-display {
      text-align: center;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .note-name {
      font-size: 7rem;
      font-weight: 700;
      line-height: 1;
      font-family: monospace;
      color: #fff;
    }

    .note-name.in-tune { color: #22c55e; }

    .note-sub {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-top: 6px;
      font-family: monospace;
    }

    .note-octave { font-size: 1.6rem; color: #555; }
    .note-freq   { font-size: 0.85rem; color: #3a3a3a; }

    /* ── Meter ── */
    .meter-wrap { width: 100%; }

    .meter-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #383838;
      margin-bottom: 8px;
    }

    .meter-track {
      position: relative;
      height: 8px;
      background: #1a1a1a;
      border-radius: 4px;
    }

    /* green zone ±5¢ */
    .meter-track::before {
      content: '';
      position: absolute;
      top: 0;
      left: calc(50% - 5%);
      width: 10%;
      height: 100%;
      background: rgba(34, 197, 94, 0.2);
      border-radius: 4px;
    }

    /* center tick */
    .meter-track::after {
      content: '';
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: calc(100% + 8px);
      background: #2a2a2a;
    }

    .needle {
      position: absolute;
      top: -7px;
      width: 3px;
      height: calc(100% + 14px);
      background: #ef4444;
      border-radius: 2px;
      left: 50%;
      transform: translateX(-50%);
    }

    .needle.in-tune { background: #22c55e; }

    .cents-label {
      text-align: center;
      margin-top: 10px;
      font-size: 0.8rem;
      color: #3a3a3a;
      font-family: monospace;
      min-height: 1.1em;
    }

    /* ── Guitar strings ── */
    .strings { display: flex; gap: 7px; }

    .str {
      padding: 9px 11px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      text-align: center;
      font-family: monospace;
      transition: border-color 0.15s;
    }

    .str-name { font-size: 1rem; color: #555; display: block; }
    .str-oct  { font-size: 0.6rem; color: #303030; display: block; margin-top: 2px; }

    .str.active .str-name { color: #22c55e; }
    .str.active { border-color: rgba(34, 197, 94, 0.35); }

    /* ── Button ── */
    #startBtn {
      padding: 14px 48px;
      font-size: 0.95rem;
      font-weight: 600;
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s;
    }

    #startBtn:hover { background: #16a34a; }

    #startBtn.stop { background: #ef4444; color: #fff; }
    #startBtn.stop:hover { background: #dc2626; }

    .err {
      font-size: 0.8rem;
      color: #ef4444;
      min-height: 1em;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>Guitar Tuner</h1>

  <div class="note-display">
    <div class="note-name" id="noteName">—</div>
    <div class="note-sub">
      <span class="note-octave" id="noteOctave"></span>
      <span class="note-freq"   id="noteFreq"></span>
    </div>
  </div>

  <div class="meter-wrap">
    <div class="meter-labels"><span>-50¢</span><span>0</span><span>+50¢</span></div>
    <div class="meter-track"><div class="needle" id="needle"></div></div>
    <div class="cents-label" id="centsLabel"></div>
  </div>

  <div class="strings" id="strings"></div>

  <button id="startBtn">Начать настройку</button>
  <div class="err" id="err"></div>
</div>

<script>
  const GUITAR_STRINGS = [
    { name: 'E', oct: 2, freq: 82.41  },
    { name: 'A', oct: 2, freq: 110.00 },
    { name: 'D', oct: 3, freq: 146.83 },
    { name: 'G', oct: 3, freq: 196.00 },
    { name: 'B', oct: 3, freq: 246.94 },
    { name: 'E', oct: 4, freq: 329.63 },
  ];

  const NOTE_NAMES = ['A','A#','B','C','C#','D','D#','E','F','F#','G','G#'];

  const $ = id => document.getElementById(id);
  const noteNameEl  = $('noteName');
  const noteOctaveEl = $('noteOctave');
  const noteFreqEl  = $('noteFreq');
  const needleEl    = $('needle');
  const centsEl     = $('centsLabel');
  const stringsEl   = $('strings');
  const btn         = $('startBtn');
  const errEl       = $('err');

  // Build string buttons
  GUITAR_STRINGS.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'str';
    d.dataset.i = i;
    d.innerHTML = `<span class="str-name">${s.name}</span><span class="str-oct">${s.oct}</span>`;
    stringsEl.appendChild(d);
  });
  const strBtns = [...stringsEl.querySelectorAll('.str')];

  let audioCtx = null, analyzerNode = null, stream = null;
  let running = false, rafId = null;

  btn.addEventListener('click', async () => {
    if (running) { stop(); return; }
    errEl.textContent = '';
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new AudioContext();
      const src = audioCtx.createMediaStreamSource(stream);
      analyzerNode = audioCtx.createAnalyser();
      analyzerNode.fftSize = 2048;
      src.connect(analyzerNode);
      running = true;
      btn.textContent = 'Стоп';
      btn.classList.add('stop');
      rafId = requestAnimationFrame(analyze);
    } catch {
      errEl.textContent = 'Нет доступа к микрофону — разрешите доступ и попробуйте снова.';
    }
  });

  function stop() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    stream?.getTracks().forEach(t => t.stop());
    audioCtx?.close();
    stream = audioCtx = analyzerNode = rafId = null;
    btn.textContent = 'Начать настройку';
    btn.classList.remove('stop');
    reset();
  }

  function reset() {
    noteNameEl.textContent = '—';
    noteNameEl.className = 'note-name';
    noteOctaveEl.textContent = '';
    noteFreqEl.textContent = '';
    needleEl.style.left = '50%';
    needleEl.className = 'needle';
    centsEl.textContent = '';
    strBtns.forEach(b => b.classList.remove('active'));
  }

  // Returns octave number for note index relative to A4=0
  function octaveOf(n, noteIdx) {
    const base = 4 + Math.floor(n / 12);
    return noteIdx >= 3 ? base + 1 : base;
  }

  function analyze() {
    if (!running) return;

    const buf = new Float32Array(analyzerNode.fftSize);
    analyzerNode.getFloatTimeDomainData(buf);

    // Skip if signal is too quiet
    let rms = 0;
    for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
    if (Math.sqrt(rms / buf.length) < 0.01) {
      rafId = requestAnimationFrame(analyze);
      return;
    }

    // Autocorrelation limited to guitar frequency range (60–1400 Hz)
    const sr = audioCtx.sampleRate;
    const minLag = Math.floor(sr / 1400);
    const maxLag = Math.ceil(sr / 60);

    const corr = new Float32Array(maxLag - minLag + 1);
    for (let lag = minLag; lag <= maxLag; lag++) {
      for (let i = 0; i < buf.length - lag; i++) {
        corr[lag - minLag] += buf[i] * buf[i + lag];
      }
    }

    // Find first rising point (end of initial fall)
    let start = 0;
    for (let i = 1; i < corr.length; i++) {
      if (corr[i] > corr[i - 1]) { start = i; break; }
    }

    // Find first peak
    let maxVal = -Infinity, maxOff = -1;
    for (let i = start; i < corr.length; i++) {
      if (corr[i] > maxVal) {
        maxVal = corr[i];
        maxOff = i;
        if (i > start && corr[i] < corr[i - 1]) break;
      }
    }

    if (maxOff < 0 || maxVal < 0.005) {
      rafId = requestAnimationFrame(analyze);
      return;
    }

    const freq    = sr / (maxOff + minLag);
    const nFloat  = 12 * Math.log2(freq / 440);
    const n       = Math.round(nFloat);
    const noteIdx = ((n % 12) + 12) % 12;
    const cents   = Math.round((nFloat - n) * 100);
    const inTune  = Math.abs(cents) <= 5;

    noteNameEl.textContent  = NOTE_NAMES[noteIdx];
    noteNameEl.className    = 'note-name' + (inTune ? ' in-tune' : '');
    noteOctaveEl.textContent = octaveOf(n, noteIdx);
    noteFreqEl.textContent   = freq.toFixed(1) + ' Hz';

    const pct = 50 + (Math.max(-50, Math.min(50, cents)) / 50) * 50;
    needleEl.style.left = pct + '%';
    needleEl.className  = 'needle' + (inTune ? ' in-tune' : '');
    centsEl.textContent = cents === 0 ? 'точно' : (cents > 0 ? '+' : '') + cents + '¢';

    // Highlight closest guitar string if within ~1 semitone
    let bestI = 0, bestD = Infinity;
    GUITAR_STRINGS.forEach((s, i) => {
      const d = Math.abs(freq - s.freq);
      if (d < bestD) { bestD = d; bestI = i; }
    });
    const threshold = GUITAR_STRINGS[bestI].freq * 0.06;
    strBtns.forEach((b, i) => b.classList.toggle('active', i === bestI && bestD < threshold));

    rafId = requestAnimationFrame(analyze);
  }
</script>
</body>
</html>
